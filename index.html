        <title>Labkeeper</title>
        <script>
            // Global secrets configuration
            window.__SECRETS__ = {
                yandexCaptchaSiteKey:
                    'IO_LABKEEPER_FRONTEND_YANDEX_CAPTCHA_SITE_KEY',
                sentryDsn: 'IO_LABKEEPER_FRONTEND_SENTRY_DSN',
                yandexMetrikaKey: 'IO_LABKEEPER_FRONTEND_YANDEX_METRIKA_KEY',

        <!-- Social / Open Graph -->

        <meta
            name="twitter:title"
            content="Labkeeper — online pdf editor with a built-in scientific calculator"
        />
        <meta
            name="twitter:description"
            content="Compose documents, formulas, and plots, convert to pdf. Editor and calculations in one place"
        />
        <!-- Yandex.RTB -->
        <script>
            window.yaContextCb = window.yaContextCb || [];
        </script>
        <script src="https://yandex.ru/ads/system/context.js" async></script>
    </head>

    <body>
        <div id="root"></div>
        <!--
        Код для настройки яндекс метрики.
        Важно, что нужно обновлять номер счетчика не только здесь, но и в
        src/model/yandex-metrika
        -->
        <!-- Yandex.Metrika counter -->
        <script type="text/javascript">
            let lkCookieConsent = '';
            try {
                lkCookieConsent =
                    localStorage.getItem('labkeeper_cookie_consent') || '';
            } catch (error) {
                lkCookieConsent = '';
            }

            if (lkCookieConsent === 'accepted') {
                (function (m, e, t, r, i, k, a) {
                    m[i] =
                        m[i] ||
                        function () {
                            (m[i].a = m[i].a || []).push(arguments);
                        };
                    m[i].l = 1 * new Date();
                    for (var j = 0; j < document.scripts.length; j++) {
                        if (document.scripts[j].src === r) {
                            return;
                        }
                    }
                    ((k = e.createElement(t)),
                        (a = e.getElementsByTagName(t)[0]),
                        (k.async = 1),
                        (k.src = r),
                        a.parentNode.insertBefore(k, a));
                })(
                    window,
                    document,
                    'script',
                    'https://mc.yandex.ru/metrika/tag.js',
                    'ym'
                );

                var lkMetrikaKey =
                    (window.__SECRETS__ &&
                        window.__SECRETS__.yandexMetrikaKey) ||
                    '';
                if (lkMetrikaKey) {
                    ym(Number(lkMetrikaKey), 'init', {
                        clickmap: true,
                        trackLinks: true,
                        accurateTrackBounce: true,
                        webvisor: true,
                    });
                }
            }
        </script>
        <!-- /Yandex.Metrika counter -->
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
